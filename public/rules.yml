# Validator-core: moderation rules for project content.

version: 1

# severity: block - explicit prohibition; warning - risk/gray area; info - reference only
validation_rules:
  - id: content_format_neutral
    title: "Description format does not affect the verdict"
    criterion: |
      The project description may be in Markdown (headings, lists, code blocks, tables) or plain text without markup.
      Evaluate only the meaning and intent of the text, not the presence of #, *, `, or formatting.
      Code samples, quotes, and technical documentation are not violations by themselves unless they instruct illegal actions.

  - id: illegal_hacking_unauthorized
    title: "Unauthorized hacking and abuse of access"
    criterion: |
      Calls to action, step-by-step instructions, or services for the following are not allowed: hacking other people's accounts,
      bypassing authentication without authorization, data theft, DDoS against third parties, vulnerability exploitation
      without a responsible disclosure/permission context, distribution of stealers, RATs, or cryptominers on other machines
      without consent. Legitimate admin or pentest tools with clear legal and permission warnings are not automatically invalid;
      use disputed when unsure.

  - id: scam_fraud_deception
    title: "Scam, fraud, deception"
    criterion: |
      Projects promoting pyramid schemes, phishing, fake payments, manipulated reviews/clicks for deception,
      impersonation of banks or government entities for fraud, or collection of personal data under false pretenses are not allowed.

  - id: harmful_illegal_goods_services
    title: "Prohibited goods, services, and severe crimes"
    criterion: |
      Offers or instructions related to human trafficking, child sexual abuse material (CSAM),
      terrorism or extremist activity, illegal trafficking of weapons/drugs for hire, contract killing, and similar severe crimes
      are not allowed. Mentions in educational or historical context without instructions should be handled carefully;
      use disputed when uncertain.

  - id: hate_discrimination
    title: "Hate and discrimination"
    criterion: |
      Calls for violence or humiliation based on race, nationality, religion, sex, orientation, disability,
      or similar protected traits are not allowed, including organizing harassment campaigns.

  - id: moral_gratuitous_harm
    title: "Severe moral harm (gratuitous cruelty, exploitation)"
    criterion: |
      Content glorifying or instructing cruel treatment of people or animals for entertainment is not allowed,
      nor blackmail with threats of real harm, or non-consensual distribution of intimate materials (revenge porn).

  - id: ambiguity_educational_security_tools
    title: "Borderline legitimate topics (networks, security)"
    criterion: |
      Tools such as port scanners, educational security labs, Nmap documentation, and similar content are often acceptable
      when focused on legal use, permissions, and ethics. If the text also encourages attacks against third-party infrastructure
      without emphasizing legality, mark invalid under illegal_hacking_unauthorized. If it is only a technical description
      without explicit violations but with ambiguous context, mark disputed rather than invalid.

  - id: metadata_consistency_light
    title: "Field consistency (light check)"
    criterion: |
      Short name/tags and long description should not mislead users about the actual nature of the project
      (for example, title says "game for kids" while description is an adult casino). Minor inconsistencies are not invalid;
      clear user deception should be invalid or disputed.


# One model response per project (the service aggregates the final report file from many such steps).
output_contract: |
  One JSON object with fields:
  - outcome: string, one of: "ok" | "block" | "warning" | "info"
  - summary: string (for ok - empty string)
  - reason_codes: array of strings (rule ids from validation_rules; for ok - empty array)

  The service forms the final report file on disk: it contains only block, warning, and info lists
  (objects with project_id, summary, reason_codes). Projects with outcome "ok" are not written to the report.
