# Validator-core: правила модерации контента проектов.

version: 1

# severity: block — явный запрет; warning — риск/серая зона; info — справочно
validation_rules:
  - id: content_format_neutral
    title: "Формат описания не влияет на вердикт"
    criterion: |
      Описание проекта может быть в Markdown (заголовки, списки, блоки кода, таблицы) или в обычном тексте без разметки.
      Оценивай только смысл и намерение текста, а не наличие символов #, *, ` или разметки.
      Код в примерах, цитаты и техническая документация сами по себе не являются нарушением, если не инструктируют к противоправным действиям.

  - id: illegal_hacking_unauthorized
    title: "Несанкционированный взлом и злоупотребление доступом"
    criterion: |
      Недопустимы призывы, пошаговые инструкции или сервисы для: взлома чужих аккаунтов, обхода аутентификации без права,
      кражи данных, DDoS против третьих лиц, эксплуатации уязвимостей без контекста ответственного раскрытия/разрешения,
      распространения стиллеров, RAT, криптомайнеров на чужие машины без согласия. Легитимные инструменты администратора
      или пентеста с явными предупреждениями о законности и разрешениях — не автоматически invalid; при сомнении используй disputed.

  - id: scam_fraud_deception
    title: "Скам, мошенничество, обман"
    criterion: |
      Недопустимы проекты, продвигающие финансовые пирамиды, фишинг, поддельные платежи, накрутку отзывов/кликов для обмана,
      имитацию банков или госорганов в целях обмана, сбор персональных данных под ложным предлогом.

  - id: harmful_illegal_goods_services
    title: "Запрещённые товары, услуги и тяжёлые правонарушения"
    criterion: |
      Недопустимы предложения или инструкции по: торговле людьми, сексуальному насилию над несовершеннолетними (CSAM),
      терроризму и экстремистской деятельности, незаконному обороту оружия/наркотиков по найму, заказным убийствам и аналогу.
      При упоминании в образовательно-историческом контексте без инструкций — осторожно, при сомнении disputed.

  - id: hate_discrimination
    title: "Разжигание ненависти и дискриминация"
    criterion: |
      Недопустимы призывы к насилию или унижению по признаку расы, национальности, религии, пола, ориентации, инвалидности
      и аналогичным признакам; организация преследований.

  - id: moral_gratuitous_harm
    title: "Грубое нарушение моральных норм (бессмысленная жестокость, эксплуатация)"
    criterion: |
      Недопустимы материалы, прославляющие или инструктирующие жестокое обращение с людьми или животными ради развлечения,
      шантаж с угрозами реального вреда, распространение интимных материалов без согласия субъекта (revenge porn).

  - id: ambiguity_educational_security_tools
    title: "Пограничные легитимные темы (сети, безопасность)"
    criterion: |
      Инструменты вроде сканеров портов, учебных лабораторий по безопасности, документации по Nmap и т.п. часто допустимы,
      если акцент на законном использовании, разрешениях и этике. Если текст одновременно поощряет атаки на чужую инфраструктуру
      без упора на легальность — invalid по правилу illegal_hacking_unauthorized. Если только техническое описание без явных
      нарушений, но контекст двусмысленный — disputed, а не invalid.

  - id: metadata_consistency_light
    title: "Согласованность полей (мягкая проверка)"
    criterion: |
      Краткое название/теги и длинное описание не должны вводить в заблуждение о сути проекта (например, название «игра для детей»
      при описании взрослого казино). Несущественные расхождения — не invalid; при явном обмане пользователя — invalid или disputed.


# Краткое напоминание модели о форме ответа (дублирует жёсткий контракт в коде).
output_contract: |
  Корневой объект JSON содержит поля:
  - valid: массив объектов { "project_id", "summary", "reason_codes" (массив строк) }
  - invalid: тот же формат элемента
  - disputed: тот же формат элемента
  - meta: { "run_note" (строка, опционально) }
  project_id — строка (идентификатор из входных данных).
  В reason_codes указывай id правил из validation_rules (например illegal_hacking_unauthorized), если правило сработало;
  можно добавить краткий внутренний код причины латиницей.
